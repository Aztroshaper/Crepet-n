<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Torreón't</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    overflow:hidden;
    font-family:monospace;
    color:white;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;

    background:url("fon.gif");
    background-size:cover;
    background-position:center;

    image-rendering:pixelated;

    animation:screenPulse 4s ease-in-out infinite;
}


#startScreen{
    position:fixed;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;

    background:rgba(0,0,0,0.75);

    z-index:9999999;

    backdrop-filter:blur(4px);
}

#startBtn{

    padding:25px 50px;

    font-size:28px;

    border:3px solid white;

    background:black;
    color:white;

    cursor:pointer;

    font-family:monospace;

    transition:0.2s;

    box-shadow:
    0 0 25px rgba(255,255,255,0.2),
    0 0 60px rgba(255,255,255,0.1);

    max-width:1000px;
}

#startBtn:hover{

    transform:scale(1.05);

    background:white;
    color:black;
}

#startText{

    margin-top:20px;

    font-size:14px;

    letter-spacing:2px;

    opacity:0.7;
}

@keyframes screenPulse{

    0%{
        filter:brightness(1);
    }

    50%{
        filter:brightness(0.92);
    }

    100%{
        filter:brightness(1);
    }
}
#darkness{
    position:fixed;
    inset:0;

    pointer-events:none;

    z-index:99990;

    background:
    radial-gradient(
        circle 170px at center,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.15) 35%,
        rgba(0,0,0,0.82) 70%,
        rgba(0,0,0,0.96) 100%
    );
}

#game::before{
    content:"";

    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(295,255,255,0.03) 0px,
        rgba(295,255,255,0.03) 2px,
        transparent 10px,
        transparent 10x
    );

    pointer-events:none;

    z-index:99998;
}
#game::after{
    content:"";

    position:absolute;
    inset:-50%;

    background-image:
    url("te.png");

    background-repeat:repeat;

    opacity:-0.14;

    mix-blend-mode:screen;

    animation:
    noiseMove 0.15s steps(2) infinite,
    vhsMove 0.12s infinite;

    pointer-events:none;

    z-index:99997;
}

@keyframes noiseMove{

    0%{
        transform:translate(0,0);
    }

    20%{
        transform:translate(-5%,-3%);
    }

    40%{
        transform:translate(-10%,5%);
    }

    60%{
        transform:translate(8%,-4%);
    }

    80%{
        transform:translate(5%,10%);
    }

    100%{
        transform:translate(0,0);
    }
}

@keyframes vhsMove{

    0%{
        transform:translateX(0px);
    }

    50%{
        transform:translateX(2px);
    }

    100%{
        transform:translateX(-2px);
    }
}

#world{
    position:absolute;

    width:1400px;
    height:1400px;

    transform-origin:top left;

    filter:
    brightness(0.45)
    contrast(1.1);
}

.tile{
    position:absolute;

    width:40px;
    height:40px;

    background-size:cover;

    image-rendering:pixelated;
}

.entity{
    position:absolute;

    width:40px;
    height:40px;

    background-size:cover;

    image-rendering:pixelated;

    z-index:5;
}

.object{
    position:absolute;

    background-size:cover;

    image-rendering:pixelated;

    z-index:4;
}

.building{
    position:absolute;

    background-size:100% 100%;

    image-rendering:pixelated;

    z-index:3;
-}

#player{

    z-index:10;

    filter:
    drop-shadow(0 0 5px rgba(255,255,255,0.7))
    drop-shadow(0 0 20px rgba(255,255,200,0.8))
    drop-shadow(0 0 40px rgba(255,255,180,0.5));

    transition:transform 0.05s linear;
}

#dialogBox{

    position:fixed;

    bottom:20px;
    left:50%;

    transform:translateX(-50%);

    width:520px;

    background:rgba(0,0,0,0.92);

    border:3px solid white;

    padding:15px;

    display:none;

    z-index:999999;
}

#dialogText{

    margin-bottom:15px;

    line-height:1.5;
}

.btn{

    display:inline-block;

    padding:10px 15px;

    background:#ffcc00;

    color:black;

    text-decoration:none;

    font-weight:bold;

    border-radius:5px;

    margin-right:10px;

    border:none;

    cursor:pointer;
}

#closeBtn{

    background:#444;

    color:white;
}

.rain{

    position:absolute;

    width:2px;
    height:20px;

    background:rgba(255,255,255,0.5);

    animation:rainFall linear infinite;

    z-index:99999;

    pointer-events:none;
}

@keyframes rainFall{

    from{
        transform:
        translateY(-100vh)
        translateX(0px);
    }

    to{
        transform:
        translateY(100vh)
        translateX(-60px);
    }
}

/* MENSAJES LIMINALES */

#liminalMessage{

    position:fixed;

    bottom:45px;
    left:50%;

    transform:translateX(-50%);

    color:white;

    font-size:20px;

    text-shadow:
    0 0 10px white,
    0 0 25px rgba(255,255,255,0.4);

    z-index:99999999;

    pointer-events:none;

    width:900px;

    text-align:center;

    opacity:0;

    transition:opacity 1s;
}

#starEvent{

    position:fixed;

    width:96px;
    height:96px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    background:url("spa.gif");

    background-size:contain;
    background-repeat:no-repeat;

    image-rendering:pixelated;

    z-index:999999999;

    pointer-events:none;

    display:none;

    animation:starSpin 3s linear infinite;
}

@keyframes starSpin{

    from{
        transform:
        translate(-50%,-50%)
        rotate(0deg)
        scale(1);
    }

    to{
        transform:
        translate(-50%,-50%)
        rotate(360deg)
        scale(1.15);
    }
}

#starText{

    position:fixed;

    top:58%;
    left:50%;

    transform:translateX(-50%);

    font-size:34px;

    letter-spacing:3px;

    color:white;

    text-shadow:
    0 0 10px white,
    0 0 25px rgba(255,255,255,0.7);

    z-index:999999999;

    opacity:0;

    transition:opacity 2s;

    pointer-events:none;
}

</style>

function typeWriter(text){

    liminalMessage.style.opacity = 1;

    liminalMessage.innerHTML = "";

    let i = 0;

    const interval = setInterval(()=>{

        liminalMessage.innerHTML += text[i];

        i++;

        if(i >= text.length){

            clearInterval(interval);

            setTimeout(()=>{

                liminalMessage.style.opacity = 0;

            },4000);
        }

    },45);
}

function randomLiminalMessage(){

    const randomText =
    liminalTexts[
        Math.floor(Math.random()*liminalTexts.length)
    ];

    typeWriter(randomText);
}

setInterval(()=>{

    randomLiminalMessage();

},18000);

    starEvent.style.display = "block";

    setTimeout(()=>{

    },3000);

const mapData = [];

}

function createTile(x,y,image){

    const tile =
    document.createElement("div");

    tile.className = "tile";

    tile.style.left =
    (x*TILE_SIZE)+"px";

    tile.style.top =
    (y*TILE_SIZE)+"px";

    tile.style.backgroundImage =
    `url(${image})`;

    world.appendChild(tile);
}

for(let y=0;y<MAP_ROWS;y++){

    for(let x=0;x<MAP_COLS;x++){

        createTile(x,y,sprites.grass);

        if(mapData[y][x] === 2){

            createTile(x,y,sprites.path);
        }

        if(mapData[y][x] === 1){

            createTile(x,y,sprites.tree);
        }

        if(mapData[y][x] === 3){

            createTile(x,y,sprites.centerTree);
        }
    }
}

const keys = {};

window.addEventListener("keydown",(e)=>{

    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup",(e)=>{

    keys[e.key.toLowerCase()] = false;
});


function rectCollision(x1,y1,w1,h1,x2,y2,w2,h2){

    return (

        x1 < x2 + w2 &&
        x1 + w1 > x2 &&
        y1 < y2 + h2 &&
        y1 + h1 > y2
    );
}

let currentNPC = null;
let currentDialogIndex = 0;

function openDialog(npc){

    currentNPC = npc;

    currentDialogIndex = 0;

    dialogBox.style.display = "block";

    updateDialog();
}

function updateDialog(){

    const npc = currentNPC;

    dialogText.innerText =
    npc.dialogs[currentDialogIndex];

    if(
        currentDialogIndex >=
        npc.dialogs.length - 1
    ){

        linkContainer.innerHTML = `
        <a class="btn"
           href="${npc.link}"
           target="_blank">
           ${npc.label}
        </a>

        <button
        class="btn"
        id="closeBtn"
        onclick="closeDialog()">
        Cerrar
        </button>
        `;

    }else{

        linkContainer.innerHTML = `
        <button
        class="btn"
        onclick="nextDialog()">
        Continuar
        </button>

        <button
        class="btn"
        id="closeBtn"
        onclick="closeDialog()">
        Cerrar
        </button>
        `;
    }
}

function nextDialog(){

    currentDialogIndex++;

    updateDialog();
}

function closeDialog(){

    dialogBox.style.display = "none";

    currentNPC = null;
}

function isSolid(nextX,nextY){

    for(let y=0;y<MAP_ROWS;y++){

        for(let x=0;x<MAP_COLS;x++){

            if(
                mapData[y][x] === 1 ||
                mapData[y][x] === 3
            ){

                if(
                    rectCollision(
                        nextX,
                        nextY,
                        player.width,
                        player.height,

                        x*TILE_SIZE + 6,
                        y*TILE_SIZE + 6,

                        28,
                        28
                    )
                ){

                    return true;
                }
            }
        }
    }

    for(let s of structures){

        if(
            rectCollision(
                nextX,
                nextY,

                player.width,
                player.height,

                s.x*TILE_SIZE,
                s.y*TILE_SIZE,

                s.w*TILE_SIZE,
                s.h*TILE_SIZE
            )
        ){

            return true;
        }
    }

    if(
        rectCollision(
            nextX,
            nextY,

            player.width,
            player.height,

            fountain.x*TILE_SIZE + 10,
            fountain.y*TILE_SIZE + 10,

            fountain.w*TILE_SIZE - 20,
            fountain.h*TILE_SIZE - 20
        )
    ){

        return true;
    }

    for(let npc of npcs){

        if(
            rectCollision(
                nextX,
                nextY,

                player.width,
                player.height,

                npc.x*TILE_SIZE + 4,
                npc.y*TILE_SIZE + 4,

                32,
                32
            )
        ){

            if(currentNPC !== npc){

                openDialog(npc);
            }

            return true;
        }
    }

    return false;
}

function checkNPCDistance(){

    if(!currentNPC) return;

    const playerCenterX =
    player.x + player.width/2;

    const playerCenterY =
    player.y + player.height/2;

    const npcCenterX =
    currentNPC.x*TILE_SIZE + 20;

    const npcCenterY =
    currentNPC.y*TILE_SIZE + 20;

    const dx =
    Math.abs(playerCenterX - npcCenterX);

    const dy =
    Math.abs(playerCenterY - npcCenterY);

    if(dx > 90 || dy > 90){

        closeDialog();
    }
}


function updateLight(){

    const screenX =
    window.innerWidth / 2;

    const screenY =
    window.innerHeight / 2;

    darkness.style.background =
    `
    radial-gradient(
        circle 330px at ${screenX}px ${screenY}px,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.15) 35%,
        rgba(0,0,0,0.82) 70%,
        rgba(0,0,0,0.96) 100%
    )
    `;
}


function update(){

    let moveX = 0;
    let moveY = 0;

    let currentSpeed = MOVE_SPEED;

    if(
        keys["shift"]
    ){

        currentSpeed = RUN_SPEED;
    }

    if(keys["w"] || keys["arrowup"]){

        moveY -= currentSpeed;
    }

    if(keys["s"] || keys["arrowdown"]){

        moveY += currentSpeed;
    }

    if(keys["a"] || keys["arrowleft"]){

        moveX -= currentSpeed;

        player.facingRight = false;
    }

    if(keys["d"] || keys["arrowright"]){

        moveX += currentSpeed;

        player.facingRight = true;
    }

    const nextX =
    player.x + moveX;

    const nextY =
    player.y + moveY;

    if(!isSolid(nextX,player.y)){

        player.x = nextX;
    }

    if(!isSolid(player.x,nextY)){

        player.y = nextY;
    }

    checkNPCDistance();

    updatePlayer();

    updateLight();

    requestAnimationFrame(update);
}

update();



function updatePlayer(){

    playerEl.style.left =
    player.x+"px";

    playerEl.style.top =
    player.y+"px";

    if(player.facingRight){

        playerEl.style.transform =
        "scaleX(-1)";

    }else{

        playerEl.style.transform =
        "scaleX(1)";
    }

    const camX =
    (window.innerWidth / 2) -
    ((player.x + TILE_SIZE/2)
    * CAMERA_ZOOM);

    const camY =
    (window.innerHeight / 2) -
    ((player.y + TILE_SIZE/2)
    * CAMERA_ZOOM);

    world.style.transform =
    `
    translate(${camX}px, ${camY}px)
    scale(${CAMERA_ZOOM})
    `;
}



function createRain(){

    for(let i=0;i<320;i++){

        const rain =
        document.createElement("div");

        rain.className = "rain";

        rain.style.left =
        Math.random()*window.innerWidth+"px";

        rain.style.animationDuration =
        (0.5 + Math.random()*0.8)+"s";

        rain.style.animationDelay =
        Math.random()*2+"s";

        rain.style.opacity =
        (0.2 + Math.random()*0.6);

        document.body.appendChild(rain);
    }
}

createRain();

</script>
