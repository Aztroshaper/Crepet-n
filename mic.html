<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voz</title>

<style>

/* ========================= */
/* BASE */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{

    background:
    linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.72)),
    url("fondo.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    overflow:hidden;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#d8d8d8;
    padding:40px;

    position:relative;
}

/* VHS */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 2px,
        transparent 4px
    );
    opacity:0.25;
    pointer-events:none;
    animation:scanlines 0.12s linear infinite;
    z-index:999;
}

@keyframes scanlines{
    from{transform:translateY(0px);}
    to{transform:translateY(4px);}
}

/* ========================= */
/* LAYOUT */
/* ========================= */

.wrapper{
    position:relative;
    z-index:5;
    display:flex;
    gap:40px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:center;
}

/* ========================= */
/* PANEL UI */
/* ========================= */

.container{
    width:620px;
    padding:40px;
    border:1px solid rgba(255,255,255,0.08);
    background:linear-gradient(to bottom, rgba(20,20,20,0.18), rgba(5,5,5,0.15));
    text-align:center;
    position:relative;
}

/* REC / PLAY TEXTOS ORIGINALES */
.container::before{
    content:"REC ●";
    position:absolute;
    top:15px;
    left:20px;
    color:#ff3a3a;
    font-size:0.75rem;
    letter-spacing:2px;
    animation:blink 1s infinite;
}

.container::after{
    content:"PLAY";
    position:absolute;
    top:15px;
    right:20px;
    color:#9f9f9f;
    font-size:0.75rem;
    letter-spacing:3px;
    opacity:0.5;
}

@keyframes blink{
    50%{opacity:0.2;}
}

/* ========================= */
/* BOTONES */
/* ========================= */

button,
.linkButton{
    border:1px solid rgba(255,255,255,0.12);
    padding:18px 28px;
    background:linear-gradient(to bottom, #202020, #080808);
    color:#dcdcdc;
    font-weight:bold;
    cursor:pointer;
    margin:10px;
    display:inline-block;
    letter-spacing:2px;
    text-decoration:none;
}

/* ========================= */
/* STATUS */
/* ========================= */

.status{
    margin-top:25px;
    opacity:0.8;
    min-height:25px;
    letter-spacing:2px;
}

/* ========================= */
/* WAVE AUDIO (RESTAURADO) */
/* ========================= */

.wave{
    width:100%;
    height:80px;
    margin-top:30px;
    display:flex;
    justify-content:center;
    align-items:end;
    gap:5px;
}

.bar{
    width:8px;
    background:linear-gradient(to top, #454545, #f0f0f0);
    border-radius:2px;
    animation:bounce 0.7s infinite alternate;
}

.bar:nth-child(2){ animation-delay:0.1s;}
.bar:nth-child(3){ animation-delay:0.2s;}
.bar:nth-child(4){ animation-delay:0.3s;}
.bar:nth-child(5){ animation-delay:0.4s;}
.bar:nth-child(6){ animation-delay:0.5s;}
.bar:nth-child(7){ animation-delay:0.6s;}

@keyframes bounce{
    from{height:10px; opacity:0.3;}
    to{height:70px; opacity:1;}
}

.hidden{
    opacity:0.05;
}

/* ========================= */
/* GIFS (ORIGINAL RESTAURADO) */
/* ========================= */

.gifArea{
    position:relative;
    width:580px;
    height:580px;
    display:flex;
    justify-content:center;
    align-items:center;
    filter:contrast(120%) brightness(75%) saturate(70%);
}

.baseGif,
.overlayGif{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
}

.overlayGif{
    display:none;
    mix-blend-mode:screen;
    opacity:0.85;
}

/* ========================= */
/* TRA GIF FULLSCREEN */
/* ========================= */

.fullGifOverlay{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.fullGifOverlay img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<div class="wrapper">

    <!-- UI -->
    <div class="container">

        <h1>VICTOR NECESITA UNA VOZ</h1>

        <p>
            Él puede aprender a imitar tu voz, pero cuidado que no te la robe. Presiona "Voz lista" cuando creas que sea humana.
        </p>

        <button id="startBtn">🎤 ENSEÑAR VOZ</button>
        <button id="stopBtn">⛔ DETENER</button>

        <br>

        <a class="linkButton" href="h3.html" id="vozLista">
            VOZ LISTA
        </a>

        <div class="status" id="status">
            VICTOR ESPERA LA VOZ...
        </div>

        <!-- WAVE RESTAURADA -->
        <div class="wave hidden" id="wave">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

    </div>

    <!-- GIFS ORIGINALES -->
    <div class="gifArea">

        <img class="baseGif" src="ave3.gif">

        <img class="overlayGif" id="overlayGif" src="ave4.gif">

    </div>

</div>

<!-- FULLSCREEN TRA -->
<div class="fullGifOverlay" id="fullOverlay">
    <img src="tra.gif">
</div>

<script>

/* ========================= */
/* AUDIO ENGINE COMPLETO */
/* ========================= */

let mediaRecorder;
let audioChunks = [];
let audioContext;
let stream;

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const statusText = document.getElementById("status");
const wave = document.getElementById("wave");
const overlayGif = document.getElementById("overlayGif");

/* ========================= */
/* VOZ LISTA */
/* ========================= */

const link = document.getElementById("vozLista");
const fullOverlay = document.getElementById("fullOverlay");

link.addEventListener("click", (e) => {
    e.preventDefault();

    fullOverlay.style.display = "flex";

    setTimeout(() => {
        window.location.href = "h3.html";
    }, 2000);
});

/* ========================= */
/* START */
/* ========================= */

startBtn.onclick = async () => {

    try{

        overlayGif.style.display = "none";

        stream = await navigator.mediaDevices.getUserMedia({ audio:true });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();

        audioChunks = [];

        const source = audioContext.createMediaStreamSource(stream);

        const filter = audioContext.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.value = 2500;

        const gain = audioContext.createGain();
        gain.gain.value = 0.85;

        source.connect(filter);
        filter.connect(gain);
        gain.connect(audioContext.destination);

        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

        mediaRecorder.onstop = async () => {

            const blob = new Blob(audioChunks);
            const buffer = await blob.arrayBuffer();
            const audioBuffer = await audioContext.decodeAudioData(buffer);

            for(let c=0;c<audioBuffer.numberOfChannels;c++){
                const data = audioBuffer.getChannelData(c);
                Array.prototype.reverse.call(data);
            }

            const src = audioContext.createBufferSource();
            src.buffer = audioBuffer;

            const dist = audioContext.createWaveShaper();
            dist.curve = makeCurve(600);

            const lp = audioContext.createBiquadFilter();
            lp.type = "lowpass";
            lp.frequency.value = 900;

            src.connect(dist);
            dist.connect(lp);
            lp.connect(audioContext.destination);

            overlayGif.style.display = "block";

            src.start();

            statusText.innerText = "▶ IMITANDO VOZ";

            src.onended = () => {
                overlayGif.style.display = "none";
                statusText.innerText = "ESPERANDO...";
            };
        };

        mediaRecorder.start();

        statusText.innerText = "🎙 ESCUCHANDO...";
        wave.classList.remove("hidden");

    }catch(e){
        statusText.innerText = "ERROR MICRÓFONO";
    }
};



stopBtn.onclick = () => {

    if(mediaRecorder && mediaRecorder.state !== "inactive"){
        mediaRecorder.stop();
        stream.getTracks().forEach(t => t.stop());
        wave.classList.add("hidden");
        statusText.innerText = "...";
    }
};


function makeCurve(amount){
    let k = amount || 50;
    let n = 44100;
    let curve = new Float32Array(n);

    for(let i=0;i<n;i++){
        let x = i*2/n - 1;
        curve[i] = (3+k)*x*20*Math.PI/180/(Math.PI+k*Math.abs(x));
    }
    return curve;
}

</script>

</body>
</html>
