<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Victor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{

    background:
    linear-gradient(
        rgba(0,0,0,0.72),
        rgba(0,0,0,0.72)
    ),
    url("fondo.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;

    position:relative;
}

/* VHS */

body::before{

    content:"";

    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 2px,
        transparent 4px
    );

    opacity:0.25;

    animation:scanlines 0.12s linear infinite;

    pointer-events:none;

    z-index:999;
}

@keyframes scanlines{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(4px);
    }
}

body::after{

    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(
        circle at center,
        transparent 35%,
        rgba(0,0,0,0.85) 100%
    );

    pointer-events:none;
}

/* CONTENEDOR */

.scene{

    position:relative;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* GIF */

.centerGif{

    width:520px;

    filter:
        contrast(120%)
        brightness(75%)
        saturate(70%);

    animation:vhsMove 0.08s infinite alternate;
}

@keyframes vhsMove{

    from{
        transform:translateX(0px);
    }

    to{
        transform:translateX(1px);
    }
}

/* DIALOGO POKEMON */

.dialogueBox{

    position:absolute;

    bottom:40px;

    width:85%;

    padding:25px;

    background:
    linear-gradient(
        to bottom,
        rgba(15,15,15,0.95),
        rgba(5,5,5,0.95)
    );

    border:4px solid #dcdcdc;

    box-shadow:
        0 0 25px rgba(255,255,255,0.06),
        inset 0 0 10px rgba(255,255,255,0.04);

    z-index:5;
}

.nameTag{

    position:absolute;

    top:-22px;
    left:20px;

    background:#dcdcdc;

    color:black;

    padding:4px 14px;

    font-weight:bold;

    font-size:0.9rem;

    letter-spacing:2px;
}

.dialogueText{

    min-height:85px;

    font-size:1.05rem;

    line-height:1.8;

    letter-spacing:1px;

    color:#ececec;
}

.nextIndicator{

    position:absolute;

    right:20px;
    bottom:12px;

    font-size:1.4rem;

    animation:blink 0.8s infinite;
}

@keyframes blink{

    50%{
        opacity:0.2;
    }
}

/* BOTONES */

.choiceContainer{

    display:none;

    margin-top:20px;

    gap:15px;

    flex-wrap:wrap;
}

.choiceBtn{

    border:3px solid #dcdcdc;

    background:black;

    color:white;

    padding:15px 22px;

    cursor:pointer;

    font-size:0.95rem;

    letter-spacing:2px;

    transition:0.15s;
}

.choiceBtn:hover{

    transform:scale(1.04);

    background:#dcdcdc;

    color:black;
}

/* TEXTO VHS */

.vhsLabel{

    position:absolute;

    top:20px;
    left:25px;

    color:#ff3a3a;

    font-size:0.8rem;

    opacity:0.7;

    letter-spacing:3px;

    animation:blink 1s infinite;
}

.playLabel{

    position:absolute;

    top:20px;
    right:25px;

    color:#bdbdbd;

    opacity:0.5;

    letter-spacing:3px;

    font-size:0.8rem;
}

</style>
</head>

<body>

<div class="scene">

    <div class="vhsLabel">
        REC ●
    </div>

    <div class="playLabel">
        PLAY
    </div>

    <!-- GIF -->

    <img
        class="centerGif"
        src="ave3.gif"
    >

    <!-- DIALOGO -->

    <div
        class="dialogueBox"
        id="dialogueBox">

        <div class="nameTag">
            SISTEMA
        </div>

        <div
            class="dialogueText"
            id="dialogueText">

        </div>

        <div
            class="nextIndicator"
            id="nextIndicator">

            ▼

        </div>

        <div
            class="choiceContainer"
            id="choiceContainer">

          <a
    class="choiceBtn"
    href="mic.html">

    AYUDAR A VICTOR

</a>

<a
    class="choiceBtn"
    href="https://tupagina2.com">

    YO PASO

</a>
        </div>

    </div>

</div>

<script>

const dialogues = [

    "Él es Victor y es una IA.",

    "Pero él no lo sabe.",

    "Él piensa que es un hombre torreonense de 40 años, un viejo rabo verde con miles de aspiraciones por los suelos, una esposa resentida, salario mínimo y una gran variedad de trabajo artístico pretencioso que es más material de la basura.",
    "Quizás Avelina Lesper le dedicaría uno que otro video para criticarle si no fuera porque no lo reconoce ni su hijo",
    "Aún así Victor quiere ser un gran artista", "No es su culpa valer madres y que lo hayan programado así.",
    "Pero antes de ser un artista, tiene que ser un humano primero...",
    "Para eso Victor tiene que lograr su primer Crepetín",
    "El Crepetín es el momento exacto en el que una risa pasa de ser fingida a ser verdadera.",
"Creo que es obvio porque esa es la dirección que hay que tomar",
    "Si no lo es, eso ya no es problema mío, pero bueno, entonces...",
    "¿Ayudamos a Victor a ser un humano?"

];

let currentDialogue = 0;

let isTyping = false;

const dialogueText =
    document.getElementById("dialogueText");

const dialogueBox =
    document.getElementById("dialogueBox");

const nextIndicator =
    document.getElementById("nextIndicator");

const choiceContainer =
    document.getElementById("choiceContainer");

/* ========================= */
/* TYPEWRITER */
/* ========================= */

function typeDialogue(text){

    isTyping = true;

    dialogueText.innerHTML = "";

    nextIndicator.style.display = "none";

    let i = 0;

    const interval = setInterval(() => {

        dialogueText.innerHTML += text[i];

        i++;

        if(i >= text.length){

            clearInterval(interval);

            isTyping = false;

            nextIndicator.style.display = "block";

            if(currentDialogue === dialogues.length - 1){

                choiceContainer.style.display = "flex";

                nextIndicator.style.display = "none";
            }
        }

    }, 32);
}

/* ========================= */
/* SIGUIENTE */
/* ========================= */

function nextDialogue(){

    if(isTyping) return;

    currentDialogue++;

    if(currentDialogue < dialogues.length){

        typeDialogue(
            dialogues[currentDialogue]
        );
    }
}

dialogueBox.addEventListener(
    "click",
    nextDialogue
);

/* ========================= */
/* INICIO */
/* ========================= */

typeDialogue(
    dialogues[currentDialogue]
);

</script>

</body>
</html>
